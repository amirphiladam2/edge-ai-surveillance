<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edge AI Dashboard</title>
    <!-- Use Bootstrap for instant styling -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-dark text-white">
    <div class="container mt-4">
        <h2 class="mb-4 text-center text-primary">Edge AI Surveillance Node</h2>
        
        <div class="row">
            <!-- Left Column: Live Video -->
            <div class="col-md-8 mb-4">
                <div class="card bg-secondary shadow">
                    <div class="card-header bg-dark text-white text-center">
                        <strong>Live Camera Feed (MJPEG)</strong>
                    </div>
                    <div class="card-body text-center p-0">
                        <!-- THIS IS WHERE THE LIVE STREAM GOES -->
                        <img src="/video_feed" class="img-fluid w-100" style="max-height: 600px; object-fit: cover;" alt="Live Video Feed">
                    </div>
                </div>
            </div>

            <!-- Right Column: Database Logs -->
            <div class="col-md-4">
                <div class="card bg-secondary shadow h-100">
                    <div class="card-header bg-dark text-white">
                        <strong>🚨 Recent Detections</strong>
                    </div>
                    <div class="card-body overflow-auto" style="max-height: 600px;">
                        {% if logs %}
                            {% for log in logs %}
                                <div class="mb-3 border-bottom border-dark pb-2">
                                    <small class="text-warning fw-bold">{{ log[0] }}</small><br>
                                    <span class="badge bg-danger mb-1">Intruder: {{ "%.2f"|format(log[1]) }}</span><br>
                                    <!-- Display the saved image -->
                                    <img src="/{{ log[2] }}" class="img-thumbnail" alt="Detection Image">
                                </div>
                            {% endfor %}
                        {% else %}
                            <p class="text-muted">No detections logged yet.</p>
                        {% endif %}
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
